<!doctype html>
<html lang="fi">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<meta name="description" content="Ajatus ja Liike RY — chess, sports and trips for children in Finland">
	<title>Aitus Jälki & Liike</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
	<header class="topbar">
		<div class="container nav"><a class="brand" href="index.html"><img src="assets/img/logo.png"
					alt="Ajatus ja liike logo"><span>AJATUS<br><em>&&nbsp;LIIKE&nbsp;RY</em></span></a>
			<nav class="menu"><a href="index.html" class="active" data-i18n="nav_home"></a><a href="organization.html"
					class="" data-i18n="nav_org"></a><a href="chess.html" class="" data-i18n="nav_chess"></a><a
					href="sports.html" class="" data-i18n="nav_sports"></a><a href="#contacts" data-i18n="nav_contact"></a></nav>
			<div class="rightnav">
				<div class="langs"><button data-lang="fi">FI</button><span>|</span><button
						data-lang="en">EN</button><span>|</span><button data-lang="ru">RU</button></div><a
					class="btn btn-primary" href="#join" data-i18n="join"></a><button class="mobile-toggle">☰</button>
			</div>
		</div>
	</header>
	<main>
		<section class="hero">
			<div class="container hero-grid">
				<div>
					<div class="eyebrow" data-i18n="hero_kicker"></div>
					<h1 data-i18n="hero_title"></h1>
					<p class="lead" data-i18n="hero_text"></p>
					<div class="hero-actions"><a class="btn btn-primary" href="#join" data-i18n="join"></a><a
							class="btn btn-outline" href="organization.html" data-i18n="read"></a></div>
					<div class="facts">
						<div class="fact"><span class="ico">👥</span><b data-i18n="f1"></b></div>
						<div class="fact"><span class="ico">♜</span><b data-i18n="f2"></b></div>
						<div class="fact"><span class="ico">🏃</span><b data-i18n="f3"></b></div>
						<div class="fact"><span class="ico">♡</span><b data-i18n="f4"></b></div>
					</div>
				</div>
				<div class="hero-photo">
					<div class="photo chess-photo"></div><span class="hero-dot"></span>
				</div>
			</div>
		</section>
		<section class="section">
			<div class="container">
				<div class="section-title">
					<h2 data-i18n="what"></h2>
					<div class="mark"></div>
				</div>
				<div class="cards">
					<article class="card">
						<div class="thumb chess-photo"></div>
						<h3>♟ <span data-i18n="chess"></span></h3>
						<p data-i18n="chess_text"></p><a class="more" href="chess.html" data-i18n="read"></a>
					</article>
					<article class="card">
						<div class="thumb sports-photo"></div>
						<h3>🏃 <span data-i18n="sports"></span></h3>
						<p data-i18n="sports_text"></p><a class="more" href="sports.html" data-i18n="read"></a>
					</article>
					<article class="card">
						<div class="thumb camp-photo"></div>
						<h3>🌲 <span data-i18n="trips"></span></h3>
						<p data-i18n="trips_text"></p><a class="more" href="sports.html" data-i18n="read"></a>
					</article>
					<article class="card">
						<div class="thumb learn-photo"></div>
						<h3>🎓 <span data-i18n="learning"></span></h3>
						<p data-i18n="learning_text"></p><a class="more" href="learning.html" data-i18n="read"></a>
					</article>
				</div>
			</div>
		</section>
	</main>
	<section class="section" id="join">
		<div class="container">
			<div class="join-strip">
				<div class="join-box">
					<div class="round-ico">👥</div>
					<div>
						<h3 data-i18n="join_title"></h3>
						<p data-i18n="join_text"></p>
					</div><a class="btn btn-dark" href="mailto:info@example.fi?subject=Join%20the%20club"
						data-i18n="join"></a>
				</div>
				<div class="divider"></div>
				<div class="join-box">
					<div class="round-ico">♥</div>
					<div>
						<h3 data-i18n="sponsor_title"></h3>
						<p data-i18n="sponsor_text"></p>
					</div><a class="btn btn-primary" href="mailto:info@example.fi?subject=Sponsorship"
						data-i18n="sponsor"></a>
				</div>
			</div>
		</div>
	</section>
	<footer class="footer" id="contacts">
		<div class="container footer-grid">
			<div><a class="brand" href="index.html"><img src="assets/img/logo.png" alt=""><span style="color:#fff">AITUS
						JÄLKI<br><em>& LIIKE</em></span></a>
				<p class="muted" data-i18n="footer_text"></p>
			</div>
			<div>
				<h3 data-i18n="contact_title"></h3>
				<p class="muted" data-i18n="contact_text"></p>
			</div>
			<div class="sponsor-footer">
				<div>
					<h3 data-i18n="sponsor_title"></h3>
					<p data-i18n="sponsor_text"></p>
				</div><a class="btn btn-primary" href="mailto:info@example.fi?subject=Sponsorship"
					data-i18n="sponsor"></a>
			</div>
		</div>
		<div class="container footer-bottom">© 2026 Aitus Jälki ry. HTML5 static website.</div>
	</footer>
	<script src="assets/js/main.js"></script>
</body>

</html>
